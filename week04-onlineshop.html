<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>online shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-100">
 <header class="bg-sky-100 fixed top-0 left-0 w-full  border-b border-yellow-900 z-50 flex items-center justify-between px-6 py-4 text-4xl font-bold text-yellow-900">
    Online Pet Shop
 </header>
 <img class="mt-50 w-full h-60 object-cover" src="./img/ペット.png" alt="ペットショップ">
 <nav class="wl-10 mt-45 flex gap-4">
    <a href="#ぶた">#PIG</a>
    <a href="#こあら">#KOARA</a>
 </nav>
 <main class="grid grid-cols-2 md:grid-cols-4 gap-4 w-[90%] mx-auto mt-50">
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">いぬ</h1>
     <span class="text-4xl">🐶</span>
     <p>￥610,000</p>
   </div>
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">ねこ</h1>
     <span class="text-3xl">😺</span>
     <p>￥420,000</p>
   </div>
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">うさぎ</h1>
     <span class="text-3xl">🐰</span>
     <p>￥25,000</p>
   </div>
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">ハムスター</h1>
     <span class="text-3xl">🐹</span>
     <p>￥3,000</p>
   </div>
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">カエル</h1>
     <span class="text-3xl">🐸</span>
     <p>￥6,200</p>
   </div>
   <div class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">きつね</h1>
     <span class="text-3xl">🦊</span>
     <p>￥1,300,000</p>
   </div>
   <div id="こあら" class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
     <h1 class="font-bold">コアラ</h1>
     <span class="text-3xl">🐨</span>
     <p>￥---</p>
   </div>
   <div id="ぶた" class="bg-white rounded shadow p-4 flex flex-col items-center transform transition hover:scale-105">
    <h1 class="font-bold">ぶた</h1>
     <span class="text-3xl">🐷</span>
     <p>￥19,000</p>
   </div>
 </main>
 <div class="flex justify-between">
  <a href="https://www.instagram.com/?hl=ja">Instgram</a>
  <p>RIKO COMPNEY</p>
 </div>
</body>
</html>
