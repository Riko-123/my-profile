<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページタイトル</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-800">
    <h1 class="font-bold text-5xl text-green-500 underline ml-3 mb-5">Profile...</h1>
    <main class="flex flex-col md:flex-row gap-5">
      
        <section class="bg-white rounded-3xl p-3 shadow-xl w-[90%] mx-auto md:w-30%">
          <h2 class="font-bold text-3xl text-center" >木下莉子</h2>
          <div class="flex gap-5">
           <img class=" hidden h-40 w-40 rounded-full object-cover" src="./img/自分.jpg" alt="木下莉子">
           <span class="text-8xl">😊</span>
           <div class="mt-6"> 
             <p>・18歳</p>
             <p>・早稲田大学</p>
             <p>・ホラー嫌い</p>
             <p>・犬派</p>
            </div>
          </div>
        </section>
        <section class="bg-white rounded-3xl p-3 shadow-xl w-[90%] mx-auto md:w-30%">
          <h3 class="font-bold text-3xl text-center">スティッチ</h3>
          <div class="flex gap-5">
           <img class="h-40 w-40 rounded-full object-cover" src="./img/スティッチ.png" alt="スティッチ">
           <span class="text-3xl"></span>
           <div class="mt-8">
             <p>・エイリアン</p>
             <p>・試作品626号</p>
             <p>・いたずら好き</p>
             <p>・泳げない</p>
            </div>
          </div>
        </section>
        <section class="bg-white rounded-3xl p-3 shadow-xl w-[90%] mx-auto md-[30%]">
          <h4 class="font-bold text-3xl text-center">シンバ</h4>
          <div class="flex gap-5">
           <img class="h-40 w-40 rounded-full object-cover" src="./img/シンバ.png" alt="シンバ">
           <span class="text-3xl"></span>
           <div class="mt-8">
             <p>・ライオン</p>
             <p>・王子</p>
             <p>・プライドランド</p>
             <p>・冒険好き</p>
            </div>
          </div>
        </section>
    </main>
  </body>
</html>
